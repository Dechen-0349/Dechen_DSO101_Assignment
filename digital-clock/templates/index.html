le<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock | DSO101</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Poppins', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }

        /* Clock Card */
        .clock-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 40px 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        /* Time Display */
        .time-display {
            text-align: center;
            margin-bottom: 32px;
        }

        .clock-time {
            font-size: 80px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 4px;
            font-family: 'Courier New', 'Monaco', monospace;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        @media (min-width: 768px) {
            .clock-time {
                font-size: 120px;
            }
        }

        .ampm {
            font-size: 24px;
            color: #00d4ff;
            margin-left: 12px;
            font-weight: 500;
        }

        .date-display {
            font-size: 20px;
            color: #c4d4e3;
            margin-top: 16px;
            letter-spacing: 1px;
        }

        /* Timezone Selector */
        .timezone-section {
            margin-bottom: 32px;
        }

        .timezone-label {
            display: block;
            color: #c4d4e3;
            margin-bottom: 12px;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .timezone-select {
            width: 100%;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .timezone-select:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: #00d4ff;
        }

        .timezone-select:focus {
            outline: none;
            border-color: #00d4ff;
            background: rgba(0, 0, 0, 0.5);
        }

        .timezone-select option {
            background: #1a1a2e;
            color: white;
        }

        /* Additional Info Cards */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 32px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info-label {
            font-size: 12px;
            color: #8ba0b5;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .info-value {
            font-size: 28px;
            font-weight: 600;
            color: #00d4ff;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
        }

        /* Loading State */
        .loading {
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        @media (max-width: 500px) {
            .clock-card {
                padding: 24px 20px;
            }
            
            .clock-time {
                font-size: 48px;
            }
            
            .ampm {
                font-size: 16px;
            }
            
            .date-display {
                font-size: 14px;
            }
            
            .info-value {
                font-size: 20px;
            }
            
            .info-grid {
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="clock-card">
            <div class="time-display">
                <div class="clock-time" id="clockTime">
                    <span id="hours">--</span>:<span id="minutes">--</span>:<span id="seconds">--</span>
                    <span class="ampm" id="ampm">--</span>
                </div>
                <div class="date-display" id="dateDisplay">--</div>
            </div>

            <div class="timezone-section">
                <label class="timezone-label">SELECT TIMEZONE</label>
                <select id="timezoneSelect" class="timezone-select">
                    {% for tz_code, tz_name in timezones %}
                    <option value="{{ tz_code }}" {% if tz_code == 'Asia/Thimphu' %}selected{% endif %}>
                        {{ tz_name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="info-grid">
                <div class="info-card">
                    <div class="info-label">HOUR</div>
                    <div class="info-value" id="hourValue">--</div>
                </div>
                <div class="info-card">
                    <div class="info-label">MINUTE</div>
                    <div class="info-value" id="minuteValue">--</div>
                </div>
                <div class="info-card">
                    <div class="info-label">SECOND</div>
                    <div class="info-value" id="secondValue">--</div>
                </div>
            </div>
        </div>
        <div class="footer">
            DIGITAL CLOCK | CI/CD DEMO | DSO101
        </div>
    </div>

    <script>
        let currentTimezone = 'Asia/Thimphu';
        let updateInterval;

        function updateClock() {
            fetch(`/time/${currentTimezone}`)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('hours').textContent = data.hour;
                    document.getElementById('minutes').textContent = data.minute;
                    document.getElementById('seconds').textContent = data.second;
                    document.getElementById('ampm').textContent = data.am_pm;
                    document.getElementById('dateDisplay').textContent = data.date;
                    document.getElementById('hourValue').textContent = data.hour;
                    document.getElementById('minuteValue').textContent = data.minute;
                    document.getElementById('secondValue').textContent = data.second;
                })
                .catch(error => console.error('Error fetching time:', error));
        }

        function startClock() {
            if (updateInterval) clearInterval(updateInterval);
            updateClock();
            updateInterval = setInterval(updateClock, 1000);
        }

        document.getElementById('timezoneSelect').addEventListener('change', function(e) {
            currentTimezone = e.target.value;
            startClock();
        });

        startClock();
    </script>
</body>
</html>

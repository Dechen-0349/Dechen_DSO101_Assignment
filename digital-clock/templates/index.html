<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock | DSO101</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }

        .clock-card {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 40px 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .time-display {
            text-align: center;
            margin-bottom: 32px;
        }

        .clock-time {
            font-size: 60px;
            font-weight: 700;
            color: #00ff88;
            letter-spacing: 4px;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        @media (min-width: 768px) {
            .clock-time {
                font-size: 100px;
            }
        }

        .ampm {
            font-size: 24px;
            color: #ff6b6b;
            margin-left: 12px;
        }

        .date-display {
            font-size: 18px;
            color: #ffffff;
            margin-top: 16px;
            font-weight: 500;
        }

        .timezone-section {
            margin-bottom: 32px;
        }

        .timezone-label {
            display: block;
            color: #ffffff;
            margin-bottom: 12px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .timezone-select {
            width: 100%;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            color: #000000;
            font-size: 16px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
        }

        .timezone-select:hover {
            background: rgba(255, 255, 255, 1);
            border-color: #00ff88;
        }

        .timezone-select:focus {
            outline: none;
            border-color: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 32px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info-label {
            font-size: 12px;
            color: #ffffff;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .info-value {
            font-size: 32px;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 5px rgba(0, 255, 136, 0.3);
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            letter-spacing: 1px;
        }

        /* Loading animation */
        .loading-text {
            color: white;
            text-align: center;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="clock-card">
            <div class="time-display">
                <div class="clock-time">
                    <span id="hours">--</span>:<span id="minutes">--</span>:<span id="seconds">--</span>
                    <span class="ampm" id="ampm">--</span>
                </div>
                <div class="date-display" id="dateDisplay">Loading...</div>
            </div>

            <div class="timezone-section">
                <label class="timezone-label">🌍 SELECT TIMEZONE</label>
                <select id="timezoneSelect" class="timezone-select">
                    <option value="Asia/Thimphu">🇧🇹 Bhutan Time (BTT)</option>
                    <option value="Asia/Kolkata">🇮🇳 India Standard Time (IST)</option>
                    <option value="Asia/Dubai">🇦🇪 Gulf Standard Time (GST)</option>
                    <option value="Europe/London">🇬🇧 Greenwich Mean Time (GMT)</option>
                    <option value="America/New_York">🇺🇸 Eastern Time (ET)</option>
                    <option value="America/Los_Angeles">🇺🇸 Pacific Time (PT)</option>
                    <option value="Asia/Tokyo">🇯🇵 Japan Standard Time (JST)</option>
                    <option value="Australia/Sydney">🇦🇺 Australian Eastern Time (AET)</option>
                </select>
            </div>

            <div class="info-grid">
                <div class="info-card">
                    <div class="info-label">🕐 HOUR</div>
                    <div class="info-value" id="hourValue">--</div>
                </div>
                <div class="info-card">
                    <div class="info-label">🕑 MINUTE</div>
                    <div class="info-value" id="minuteValue">--</div>
                </div>
                <div class="info-card">
                    <div class="info-label">🕒 SECOND</div>
                    <div class="info-value" id="secondValue">--</div>
                </div>
            </div>
        </div>
        <div class="footer">
            DIGITAL CLOCK | CI/CD DEMO | DSO101 ⚡
        </div>
    </div>

    <script>
        let currentTimezone = 'Asia/Thimphu';
        let updateInterval;

        function updateClock() {
            fetch(`/time/${currentTimezone}`)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('hours').textContent = data.hour;
                    document.getElementById('minutes').textContent = data.minute;
                    document.getElementById('seconds').textContent = data.second;
                    document.getElementById('ampm').textContent = data.am_pm;
                    document.getElementById('dateDisplay').textContent = data.date;
                    document.getElementById('hourValue').textContent = data.hour;
                    document.getElementById('minuteValue').textContent = data.minute;
                    document.getElementById('secondValue').textContent = data.second;
                })
                .catch(error => {
                    console.error('Error fetching time:', error);
                    document.getElementById('dateDisplay').textContent = 'Error loading time';
                });
        }

        function startClock() {
            if (updateInterval) clearInterval(updateInterval);
            updateClock();
            updateInterval = setInterval(updateClock, 1000);
        }

        const selectElement = document.getElementById('timezoneSelect');
        if (selectElement) {
            selectElement.addEventListener('change', function(e) {
                currentTimezone = e.target.value;
                startClock();
            });
        }

        // Start the clock when page loads
        startClock();
    </script>
</body>
</html>
